# i3 theme generated dynamically by Pywal

# Core colors
set $background #0f1d22
set $foreground #c3c6c7
set $color0 #0f1d22
set $color1 #24545E
set $color2 #5E6A57
set $color3 #4E8472
set $color4 #989672
set $color5 #376E89
set $color6 #4D9E9A
set $color7 #c3c6c7
set $color8 #5e6e73
set $color9 #24545E
set $color10 #5E6A57
set $color11 #4E8472
set $color12 #989672
set $color13 #376E89
set $color14 #4D9E9A
set $color15 #c3c6c7

# Window colors
client.focused           $color2 $background $foreground $color2 $color2
client.focused_inactive  $color0 $background $foreground $color0 $color0
client.unfocused         $color0 $background $foreground $color0 $color0
client.urgent            $color1 $background $color1 $background $color1
client.placeholder       $color0 $background $foreground $color0 $color0
client.background        $background

cat > ~/.config/wal/templates/colors-btop << 'EOF'
{
  "theme": {
    "main_bg": "#0f1d22",
    "main_fg": "#c3c6c7",
    "title": "#5E6A57",
    "error": "#24545E",
    "warning": "#4E8472",
    "info": "#989672",
    "highlight": "#5E6A57",
    "selected_bg": "#5E6A57",
    "selected_fg": "#0f1d22",
    "graph_text": "#c3c6c7",
    "meter_bg": "#0f1d22",
    "proc_misc": "#5e6e73",
    "cpu_box": "#0f1d22",
    "mem_box": "#0f1d22",
    "net_box": "#0f1d22",
    "proc_box": "#0f1d22",
    "divider": "#5e6e73",
    "divider_light": "#c3c6c7",
    "graph_symbols": "braille",
    "graph_colors": ["#5E6A57", "#4E8472", "#989672", "#24545E", "#376E89", "#4D9E9A"],
    "background": true
  }
}
