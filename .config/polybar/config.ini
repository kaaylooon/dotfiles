include-file = ~/.config/polybar/colors.ini

include-file = ~/.config/polybar/arrows

[color]

; vim:ft=dosini


[bar/kaay]
font-0 = Noto Sans Mono:size=12;2
font-1 = Noto Sans Mono Ner Font:size=12;2
font-2 = Noto Sans Mon:style=Bold:size=12;2

font-3 = 0xProto Nerd Font Mono:style=Bold:size=15;2

width = 100%
height = 23pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 1pt

border-size = 2pt
border-color = #00000000

padding-left = 0
padding-right = 2

module-margin = 1

separator = " ‚ÄĘ "
separator-foreground = ${colors.disabled}

; xwindow
modules-left = xworkspaces 
modules-center = date2
modules-right =  xkeyboard  memory cpu  date

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true


[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.primary}
label-active-padding = 2
label-active-margin = 1

label-occupied = %name%
label-occupied-padding = 2
label-occupied-margin = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2


[module/xwindow]
type = internal/xwindow

label = %title:0:50:...%
label-empty = " "


[module/filesystem]
type = internal/fs
interval = 25

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}


[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-font = 1

label-indicator-padding = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 3
format-prefix = "ůįćõ "
format-prefix-font = 2
format-prefix-foreground = ${colors.primary}
label = %percentage_used%%
label-padding = 1

[module/cpu]
type = internal/cpu
interval = 3

format-prefix = "Ôčõ "
format-prefix-font = 2
format-prefix-foreground = ${colors.primary}
label = %percentage:0%%
label-padding = 1

[module/wired-network]
type = internal/network
interface = eth1

[module/date2]
type = internal/date
interval = 1

date = "%a, %H:%M:%S"

label = %date%

[module/date]
type = internal/date
interval = 1

date = "%d/%m"

format-prefix = "ÔÄó  "
format-prefix-font = 3
format-prefix-foreground = ${colors.primary}

label = %date%

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini